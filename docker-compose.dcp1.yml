# GLM-5.2 MXFP8-NVFP4-NF3 Hybrid — MAX-PREFILL profile (DCP1, 4-bit KV)
# Same tuned settings, no decode-context-parallelism: every rank attends its own full KV — fastest
# prefill this stack can do on 4 GPUs, smallest pool.
# PROJECTED from measured DCP scaling (DCP1/2/4 prefill 3,276/2,597/1,766 on this stack) — not yet benchmarked
# at these exact settings:
#   KV pool ~140k tokens · prefill ~3,300 tok/s @32k · single-stream decode ~66-73 tok/s
#   TTFT @64k ~20s
# Use this for short-context, TTFT-critical serving (<130k prompts). For more context at the same
# decode speed, use the DCP2 (~277k) or DCP4 (~546k) profiles.
# DCP-specific envs (GLOBAL_TOPK / SHARD_DRAFT / A2A) are omitted — they are no-ops at DCP1.
# Model (public): https://huggingface.co/madeby561/GLM-5.2-MXFP8-NVFP4-NF3-Hybrid
#   hf download madeby561/GLM-5.2-MXFP8-NVFP4-NF3-Hybrid --local-dir ./glm52-hybrid
#   MODEL_DIR=./glm52-hybrid docker compose -f docker-compose.dcp1.yml up -d
services:
  glm52:
    image: davidyoung/vllm-glm52-nvfp4-nf3-hybrid-lowbit-kv:v1
    network_mode: host
    ipc: host
    shm_size: 32gb
    init: true
    ulimits: { memlock: -1, stack: 67108864 }
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${MODEL_DIR:?set MODEL_DIR to the downloaded checkpoint dir}:/model:ro
      - vllm-cache:/cache
    environment:
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_DEVICE_MAX_CONNECTIONS: "32"
      CUTE_DSL_ARCH: sm_120a
      OMP_NUM_THREADS: "16"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      SAFETENSORS_FAST_GPU: "1"
      NCCL_IB_DISABLE: "1"
      NCCL_P2P_LEVEL: SYS
      NCCL_PROTO: LL,LL128,Simple
      XDG_CACHE_HOME: /cache/jit
      TRITON_CACHE_DIR: /cache/jit/triton
      VLLM_USE_B12X_FP8_GEMM: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_USE_B12X_SPARSE_INDEXER: "1"
      VLLM_USE_V2_MODEL_RUNNER: "1"
      B12X_W4A16_TC_DECODE: "1"
      B12X_MOE_FORCE_A16: "1"
      VLLM_ENABLE_PCIE_ALLREDUCE: "1"
      VLLM_PCIE_ALLREDUCE_BACKEND: b12x
      VLLM_PCIE_ONESHOT_ALLREDUCE_MAX_SIZE: 64KB
      B12X_DENSE_SPLITK_TURBO: "1"
      VLLM_PCIE_DMA_FP8: ag
      B12X_PCIE_DMA_FP8: ag
      HYBRID_TIER: both
      HYBRID_KEPT: b12x_nf3
      HYBRID_NF3: b12x_nf3
      HYBRID_B12X_MAX_TOKENS: "2048"
      HYBRID_MXFP8_NATIVE: "1"
    command: >
      vllm serve /model
      --served-model-name GLM-5.2 --host 0.0.0.0 --port 5001
      --trust-remote-code --tensor-parallel-size 4
      --decode-context-parallel-size 1
      --kv-cache-dtype nvfp4_ds_mla
      --attention-backend B12X_MLA_SPARSE
      --moe-backend b12x
      --load-format safetensors
      -cc.pass_config.fuse_allreduce_rms=True
      --gpu-memory-utilization 0.96
      --max-model-len 130000 --max-num-seqs 8 --max-num-batched-tokens 2048
      --max-cudagraph-capture-size 64
      --async-scheduling --enable-chunked-prefill --enable-prefix-caching
      --enable-auto-tool-choice --tool-call-parser glm47
      --reasoning-parser glm45
      --default-chat-template-kwargs '{"reasoning_effort":"high"}'
      --hf-overrides '{"use_index_cache":true,"index_topk_pattern":"FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS"}'
      --speculative-config '{"method":"mtp","num_speculative_tokens":5,"moe_backend":"b12x","draft_sample_method":"probabilistic"}'
volumes:
  vllm-cache:
