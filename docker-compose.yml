# GLM-5.2 MXFP8-NVFP4-NF3 Hybrid — measured production profile.
# Hardware: 4x RTX PRO 6000 Blackwell 96 GB, TP4/DCP4, Gen5 P2P switch.
# Measured: 647,680-token KV pool; prefill 1,835/1,981/2,036/2,038 tok/s
# at 8k/32k/64k/128k; 67.7 tok/s C1 decode at 8k; 4/4 needle at 128k.
#
# Quickstart:
#   hf download madeby561/GLM-5.2-MXFP8-NVFP4-NF3-Hybrid --local-dir ./glm52-hybrid
#   docker compose build acs-preflight
#   docker compose up -d
services:
  acs-preflight:
    image: glm52-acs-guard:local
    build:
      context: .
      dockerfile: Dockerfile.acs
    network_mode: none
    privileged: true
    restart: "no"
    volumes:
      - /sys:/sys

  glm52:
    image: davidyoung/vllm-glm52-nvfp4-nf3-hybrid-lowbit-kv:v1.2@sha256:994fb9dfa20ea37544fb5454d076a25edb3947a6553d55c13c2ddea60adbd18d
    pull_policy: always
    depends_on:
      acs-preflight:
        condition: service_completed_successfully
    network_mode: host
    ipc: host
    shm_size: 32gb
    init: true
    ulimits:
      memlock: -1
      stack: 67108864
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ${MODEL_DIR:-./glm52-hybrid}:/model:ro
      - vllm-cache:/cache
    environment:
      CUDA_VISIBLE_DEVICES: "0,1,2,3"
      CUDA_DEVICE_ORDER: PCI_BUS_ID
      CUDA_DEVICE_MAX_CONNECTIONS: "32"
      CUTE_DSL_ARCH: sm_120a
      OMP_NUM_THREADS: "16"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
      SAFETENSORS_FAST_GPU: "1"
      NCCL_IB_DISABLE: "1"
      NCCL_P2P_LEVEL: SYS
      NCCL_PROTO: LL,LL128,Simple
      XDG_CACHE_HOME: /cache/jit
      TRITON_CACHE_DIR: /cache/jit/triton
      VLLM_USE_B12X_FP8_GEMM: "1"
      VLLM_USE_B12X_MOE: "1"
      VLLM_USE_B12X_SPARSE_INDEXER: "1"
      VLLM_USE_V2_MODEL_RUNNER: "1"
      B12X_MOE_FORCE_A16: "1"
      VLLM_DCP_GLOBAL_TOPK: "1"
      VLLM_DCP_SHARD_DRAFT: "1"
      VLLM_ENABLE_PCIE_ALLREDUCE: "1"
      VLLM_PCIE_ALLREDUCE_BACKEND: b12x
      VLLM_PCIE_ONESHOT_ALLREDUCE_MAX_SIZE: 64KB
      B12X_DENSE_SPLITK_TURBO: "1"
      B12X_MLA_SM120_PREFILL_F16_ROPE: "1"
      VLLM_PCIE_DMA_FP8: ag
      B12X_PCIE_DMA_FP8: ag
      VLLM_USE_B12X_DCP_A2A: "1"
      VLLM_DCP_A2A_MAX_TOKENS: "64"
      VLLM_DCP_A2A_LARGE_BACKEND: ag_rs
      VLLM_DCP_PROJECT_BEFORE_MERGE: "1"
      VLLM_DCP_PROJECT_BEFORE_MERGE_MIN_PREFILL_TOKENS: "1024"
      HYBRID_TIER: both
      HYBRID_KEPT: b12x_nf3
      HYBRID_NF3: b12x_nf3
      HYBRID_B12X_MAX_TOKENS: "2048"
      HYBRID_MXFP8_NATIVE: "1"
      SWEEP_PROFILE_NAME: fastest_ondemand_bf16_dcp4_mnbt3072_mtp3
    command:
      - vllm
      - serve
      - /model
      - --served-model-name
      - GLM-5.2
      - --host
      - 0.0.0.0
      - --port
      - "5001"
      - --trust-remote-code
      - --tensor-parallel-size
      - "4"
      - --decode-context-parallel-size
      - "4"
      - --dcp-comm-backend
      - ag_rs
      - --dcp-kv-cache-interleave-size
      - "1"
      - --kv-cache-dtype
      - nvfp4_ds_mla
      - --attention-backend
      - B12X_MLA_SPARSE
      - --moe-backend
      - b12x
      - --load-format
      - safetensors
      - -cc.pass_config.fuse_allreduce_rms=True
      - --gpu-memory-utilization
      - "0.975"
      - --max-model-len
      - "480000"
      - --max-num-seqs
      - "8"
      - --max-num-batched-tokens
      - "3072"
      - --max-cudagraph-capture-size
      - "64"
      - --async-scheduling
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --enable-auto-tool-choice
      - --tool-call-parser
      - glm47
      - --reasoning-parser
      - glm45
      - --default-chat-template-kwargs
      - '{"reasoning_effort":"high"}'
      - --hf-overrides
      - '{"use_index_cache":true,"index_topk_pattern":"FFFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSSFSSS"}'
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"b12x","draft_sample_method":"probabilistic"}'

volumes:
  vllm-cache:
